      docker-file: clients/matching_component/Dockerfile
      docker-context: ./clients/matching_component
      tags: "pr-${{ inputs.pr_number }}"
      build-args: |
        "IMAGE_TAG=pr-${{ inputs.pr_number }}"
        "CORE_HOST=${{ vars.CORE_HOST }}"
    secrets: inherit

  build-intro-course-developer:
    needs: [build-base, retag-clients]
    if: |
