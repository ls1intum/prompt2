name: Build and Push Docker Image Servers

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Optional image tag override (for prod releases)"
        required: false
        type: string
      update_main_latest:
        description: "Whether to also tag images as main-latest (for use as PR retag base)"
        required: false
        type: boolean
        default: false
    outputs:
      server_core_image_tag:
        description: "The tag of the image that was built"
        value: ${{ jobs.core.outputs.image_tag }}
      server_intro_course_image_tag:
        description: "The tag of the image that was built"
        value: ${{ jobs.intro-course.outputs.image_tag }}
      server_team_allocation_image_tag:
        description: "The tag of the image that was built"
        value: ${{ jobs.team-allocation.outputs.image_tag }}
      server_assessment_image_tag:
        description: "The tag of the image that was built"
        value: ${{ jobs.assessment.outputs.image_tag }}
      server_self_team_allocation_image_tag:
        description: "The tag of the image that was built"
        value: ${{ jobs.self-team-allocation.outputs.image_tag }}
      server_interview_image_tag:
        description: "The tag of the interview server image that was built"
        value: ${{ jobs.interview.outputs.image_tag }}

permissions:
  contents: read
  packages: write

jobs:
  resolve-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.resolve.outputs.tags }}
    steps:
      - id: resolve
        run: |
          TAGS="${{ inputs.release_tag }}"
          if [ "${{ inputs.update_main_latest }}" = "true" ]; then
            if [ -n "$TAGS" ]; then
              TAGS="$TAGS,main-latest"
            else
              TAGS="main-latest"
            fi
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

  core:
    needs: resolve-tags
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@v1.2.0
    with:
      image-name: ghcr.io/prompt-edu/prompt/prompt-server-core # Defaults to the repository name
      docker-file: servers/Dockerfile # Defaults to Dockerfile
      docker-context: ./servers/core
      tags: ${{ needs.resolve-tags.outputs.tags }}
    secrets: inherit

  intro-course:
    needs: resolve-tags
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@v1.2.0
    with:
      image-name: ghcr.io/prompt-edu/prompt/prompt-server-intro-course
      docker-file: servers/Dockerfile
      docker-context: ./servers/intro_course
      tags: ${{ needs.resolve-tags.outputs.tags }}
    secrets: inherit

  team-allocation:
    needs: resolve-tags
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@v1.2.0
    with:
      image-name: ghcr.io/prompt-edu/prompt/prompt-server-team-allocation
      docker-file: servers/Dockerfile
      docker-context: ./servers/team_allocation
      tags: ${{ needs.resolve-tags.outputs.tags }}
    secrets: inherit

  assessment:
    needs: resolve-tags
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@v1.2.0
    with:
      image-name: ghcr.io/prompt-edu/prompt/prompt-server-assessment
      docker-file: servers/Dockerfile
      docker-context: ./servers/assessment
      tags: ${{ needs.resolve-tags.outputs.tags }}
    secrets: inherit

  self-team-allocation:
    needs: resolve-tags
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@v1.2.0
    with:
      image-name: ghcr.io/prompt-edu/prompt/prompt-server-self-team-allocation
      docker-file: servers/Dockerfile
      docker-context: ./servers/self_team_allocation
      tags: ${{ needs.resolve-tags.outputs.tags }}
    secrets: inherit

  interview:
    needs: resolve-tags
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@v1.2.0
    with:
      image-name: ghcr.io/prompt-edu/prompt/prompt-server-interview
      docker-file: servers/Dockerfile
      docker-context: ./servers/interview
      tags: ${{ needs.resolve-tags.outputs.tags }}
    secrets: inherit
